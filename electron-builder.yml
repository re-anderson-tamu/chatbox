productName: NRI OAK
appId: edu.tamu.nri.oak
asar: true
asarUnpack:
  - "**\\*.{node,dll}"
  - '**/node_modules/libsql/**'
files:
  - 'dist'
  # - "!dist/**/*.map"
  # - "!dist/**/stats.html"
  - 'node_modules'
  - 'package.json'

afterSign: .erb/scripts/notarize.js
afterPack: .erb/scripts/patch-libsql.cjs

# releaseInfo:
#   releaseNotes: See the changelog for details

mac:
  notarize: false
  category: public.app-category.developer-tools
  target:
    target: default
    arch:
      - arm64
      - x64
  type: distribution
  hardenedRuntime: true
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  verifyUpdateCodeSignature: false
  artifactName: ${productName}-${version}-Setup.${ext}
  sign: ./custom_win_sign.js
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: assets/installer.nsh

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  app: release/app
  buildResources: assets
  output: release/build

extraResources:
  - ./assets/**

publish:
  # Generic provider: electron-updater checks {url}/{channel}.yml for updates
  # and downloads installers from {url}/{filename}.
  # Files are uploaded to Azure Blob Storage by the release pipeline.
  # Replace YOUR_STORAGE_ACCOUNT and YOUR_CONTAINER with your actual values.
  - provider: generic
    url: https://YOUR_STORAGE_ACCOUNT.blob.core.windows.net/YOUR_CONTAINER/${env.UPDATE_CHANNEL}
