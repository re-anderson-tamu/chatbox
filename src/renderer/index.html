<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="height=device-height, width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="chatbox" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="chatbox" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <title>OAK</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B365F44W6E"></script>
    <script defer data-domain="app.chatboxai.app" src="https://plausible.midway.run/js/script.local.hash.js"></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          ;(window.plausible.q = window.plausible.q || []).push(arguments)
        }
    </script>

    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())

      // gtag('config', 'G-B365F44W6E');
    </script>
    <script>
      var initialTheme = localStorage.getItem('initial-theme')
      if (initialTheme === 'light' || initialTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', initialTheme)
        document.documentElement.setAttribute('data-mantine-color-scheme', initialTheme)
      }
    </script>
    <style>
      html[data-theme='dark'] {
        background-color: #242424;
      }

      .splash-screen {
        position: fixed;
        z-index: 99999;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 1;
        background-color: #fff;
        overflow: hidden;
      }
      html[data-theme='dark'] .splash-screen {
        background-color: #242424;
      }

      .splash-screen-top {
        flex: 2;
        width: 100%;
      }
      .splash-screen-bottom {
        flex: 3;
        width: 100%;
        position: relative;
      }

      .splash-screen-bg-top,
      .splash-screen-bg-bottom {
        position: absolute;
        left: 0;
        width: 100%;
        height: auto;
        pointer-events: none;
        filter: contrast(3);
      }
      html[data-theme='dark'] .splash-screen-bg-top,
      html[data-theme='dark'] .splash-screen-bg-bottom {
        filter: invert(1) contrast(5);
      }
      .splash-screen-bg-top {
        top: 0;
      }
      .splash-screen-bg-bottom {
        bottom: 0;
        left: 0;
        width: 100%;
        height: auto;
        pointer-events: none;
      }
      .splash-screen-content {
        flex: 0 0 auto;
        position: relative;
      }

      .splash-screen-fade-out {
        animation: fade-out 0.5s ease-in-out forwards;
      }

      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div class="splash-screen">
      <img class="splash-screen-bg-top" src="/top-background.png" alt="" />
      <img class="splash-screen-bg-bottom" src="/bottom-background.png" alt="" />
      <div class="splash-screen-top"></div>
      <div class="splash-screen-content">NRI OAK</div>
      <div class="splash-screen-bottom" id="log-root"></div>
    </div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
